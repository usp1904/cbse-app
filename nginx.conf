proxy_cache_path /tmp/cbse-cache levels=1:2 keys_zone=cbse_cache:10m max_size=256m inactive=6h use_temp_path=off;

upstream cbse_app_cluster {
    least_conn;
    server 127.0.0.1:9090 max_fails=3 fail_timeout=10s;
}

# ─── HTTP → HTTPS Redirect ─────────────────────────────────────────────────
server {
    listen 80;
    server_name cbse.app www.cbse.app;
    client_max_body_size 10m;

    # Let's Encrypt ACME challenge (required for certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name cbse.app www.cbse.app;
    client_max_body_size 10m;

    # SSL certificates — generated by certbot.
    # Run: sudo certbot --nginx -d cbse.app -d www.cbse.app
    ssl_certificate     /etc/letsencrypt/live/cbse.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cbse.app/privkey.pem;

    # Modern TLS config (Mozilla intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # HSTS — tell browsers to always use HTTPS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    gzip on;
    gzip_types text/css application/javascript application/json text/html;
    gzip_min_length 256;
    gzip_vary on;

    location / {
        proxy_pass http://cbse_app_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
        proxy_cache cbse_cache;
        proxy_cache_key "$scheme://$host$request_uri";
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 10s;

        add_header X-Cache-Status $upstream_cache_status;
    }

    location /style.css {
        proxy_pass http://cbse_app_cluster;
        proxy_cache cbse_cache;
        proxy_cache_valid 200 24h;
        add_header Cache-Control "public, max-age=86400, immutable";
    }

    location /sw.js {
        proxy_pass http://cbse_app_cluster;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    location /manifest.json {
        proxy_pass http://cbse_app_cluster;
        proxy_cache cbse_cache;
        proxy_cache_valid 200 24h;
        add_header Cache-Control "public, max-age=86400";
    }

    location /api/ {
        proxy_pass http://cbse_app_cluster;
        proxy_cache_bypass $http_cache_control;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://cbse_app_cluster;
        proxy_cache off;
        access_log off;
    }
}
