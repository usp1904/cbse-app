proxy_cache_path /tmp/cbse-cache levels=1:2 keys_zone=cbse_cache:10m max_size=256m inactive=6h use_temp_path=off;

upstream cbse_app_cluster {
    least_conn;
    server 127.0.0.1:9091 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:9092 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:9093 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:9094 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    gzip on;
    gzip_types text/css application/javascript application/json text/html;
    gzip_min_length 256;
    gzip_vary on;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://cbse_app_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
        proxy_cache cbse_cache;
        proxy_cache_key "$scheme://$host$request_uri";
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 10s;

        add_header X-Cache-Status $upstream_cache_status;
    }

    location /style.css {
        proxy_pass http://cbse_app_cluster;
        proxy_cache cbse_cache;
        proxy_cache_valid 200 24h;
        add_header Cache-Control "public, max-age=86400, immutable";
    }

    location /sw.js {
        proxy_pass http://cbse_app_cluster;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    location /manifest.json {
        proxy_pass http://cbse_app_cluster;
        proxy_cache cbse_cache;
        proxy_cache_valid 200 24h;
        add_header Cache-Control "public, max-age=86400";
    }

    location /api/ {
        proxy_pass http://cbse_app_cluster;
        proxy_cache_bypass $http_cache_control;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://cbse_app_cluster;
        proxy_cache off;
        access_log off;
    }
}
